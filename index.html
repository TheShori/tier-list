<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dcdcdc;
}

/* TOP BAR */
.topBar{
  background:#34495e;
  padding:20px 40px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.userCard{
  display:flex;
  align-items:center;
  gap:15px;
  background:#3f556b;
  padding:12px 20px;
  border-radius:40px;
  color:white;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
}

.userCard img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.badge{
  background:#2ecc71;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
}

.logout{
  cursor:pointer;
  font-weight:bold;
}

/* SECTIONS */
.section{
  margin:40px auto 20px;
  width:90%;
  background:#3f556b;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
  letter-spacing:1px;
}

/* TABLE */
.table{
  width:90%;
  margin:auto;
  display:flex;
  justify-content:space-between;
  gap:20px;
}

.column{
  flex:1;
  background:#eee;
  border-radius:12px;
  padding:15px;
  min-height:300px;
  box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.header{
  font-weight:bold;
  text-align:center;
  margin-bottom:15px;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  background:#d5d8dc;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
  cursor:pointer;
}

.row img{
  width:30px;
  height:30px;
  border-radius:50%;
}

.placeholder{
  height:40px;
  background:#bbb;
  border-radius:8px;
  margin-bottom:8px;
}
</style>
</head>
<body>

<div class="topBar" id="topBar"></div>
<div id="tiersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");

const OWNER_UID = "HizrEHr3BjgUTyJZsSPoei0gHrA2";

/* ================= CONFIG ================= */

const tiers = [
  {id:"new", label:"PERSONAJES NUEVOS"},
  {id:"god", label:"GOD TIER"},
  {id:"semi", label:"SEMI-GOD TIER"},
  {id:"usables", label:"USABLES"},
  {id:"ocasionales", label:"OCASIONALES"},
  {id:"meme", label:"MEME"}
];

const classes = ["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

let isAdmin=false;
let currentData=null;
let dragged=null;
let placeholder=document.createElement("div");
placeholder.className="placeholder";

/* ================= LOGIN ================= */

auth.onAuthStateChanged(user=>{
  const bar=document.getElementById("topBar");
  bar.innerHTML="";

  if(user){
    isAdmin = user.uid===OWNER_UID;
    bar.innerHTML=`
      <div class="userCard">
        <img src="${user.photoURL}">
        <div>${user.displayName}</div>
        ${isAdmin?'<div class="badge">ADMIN</div>':''}
        <div class="logout" onclick="auth.signOut()">Cerrar sesión</div>
      </div>`;
  }
});

/* ================= BUILD UI ================= */

function buildStructure(){
  const container=document.getElementById("tiersContainer");
  container.innerHTML="";
  tiers.forEach(t=>{
    container.innerHTML+=`
      <div class="section">${t.label}</div>
      <div class="table" id="${t.id}"></div>`;
  });
}

function createTables(){
  tiers.forEach(t=>{
    const table=document.getElementById(t.id);
    table.innerHTML="";
    classes.forEach(cls=>{
      let col=document.createElement("div");
      col.className="column";
      col.dataset.cls=cls;
      col.innerHTML=`<div class="header">${cls}</div>`;

      col.addEventListener("dragover",e=>{
        if(!isAdmin) return;
        e.preventDefault();
        col.appendChild(placeholder);
      });

      col.addEventListener("drop",async e=>{
        if(!isAdmin) return;
        e.preventDefault();
        col.insertBefore(dragged,placeholder);
        placeholder.remove();
        await saveData();
      });

      table.appendChild(col);
    });
  });
}

/* ================= RENDER ================= */

function createRow(character){
  let r=document.createElement("div");
  r.className="row";
  r.innerHTML=`<img src="${character.image}"><span>${character.name}</span>`;

  if(isAdmin){
    r.draggable=true;
    r.addEventListener("dragstart",()=>{dragged=r;});
  }
  return r;
}

function render(data){
  currentData=data;
  buildStructure();
  createTables();

  tiers.forEach(t=>{
    classes.forEach(cls=>{
      if(data[t.id][cls]){
        data[t.id][cls].forEach(char=>{
          document.querySelector(`#${t.id} [data-cls="${cls}"]`)
          .appendChild(createRow(char));
        });
      }
    });
  });
}

/* ================= SAVE ================= */

async function saveData(){
  let data={};
  tiers.forEach(t=>{
    data[t.id]={};
    classes.forEach(cls=>{
      data[t.id][cls]=[];
      document.querySelectorAll(`#${t.id} [data-cls="${cls}"] .row`)
      .forEach(r=>{
        data[t.id][cls].push({
          name:r.querySelector("span").textContent,
          image:r.querySelector("img").src
        });
      });
    });
  });
  await tierRef.set(data);
}

/* ================= INIT ================= */

async function init(){
  let snap=await tierRef.get();
  if(!snap.exists){
    let base={};
    tiers.forEach(t=>{
      base[t.id]={};
      classes.forEach(cls=>base[t.id][cls]=[]);
    });
    await tierRef.set(base);
    render(base);
  }else{
    render(snap.data());
  }

  tierRef.onSnapshot(doc=>{
    if(doc.exists) render(doc.data());
  });
}

buildStructure();
init();

/* ================= PERSONAJES MANUALES SIN DUPLICADOS ================= */

async function ensureCharacter(tier,cls,name,image){
  let snap=await tierRef.get();
  let data=snap.data();
  if(!data[tier][cls].some(c=>c.name===name)){
    data[tier][cls].push({name,image});
    await tierRef.set(data);
  }
}

ensureCharacter("new","TECNOS",
"Iron Man (Clásico)",
"https://pbs.twimg.com/media/F5RqSzSXYAA-_Z-?format=png&name=360x360");

ensureCharacter("new","MUTANTES",
"Onslaught",
"https://pbs.twimg.com/media/GAhX3ujXIAIKxIg?format=png&name=360x360");

</script>
</body>
</html>
