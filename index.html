<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Tier List MCOC PRO</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f0f0;
    padding-top: 90px; /* espacio para la topbar fija */
  }

  /* Top Bar */
  .topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #2c3e50;
    padding: 16px 28px;
    width: 100%;
    color: white;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.25);
    box-sizing: border-box;
  }

  .button {
    background-color: #34495e;
    color: white;
    padding: 10px 14px;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    transition: background-color 0.2s;
    font-weight: 700;
    user-select: none;
  }
  .button:hover { background-color: #2980b9; }

  #userArea { display: flex; align-items: center; gap: 12px; }

  .userInfo {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #34495e;
    padding: 10px 14px;
    border-radius: 999px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.25);
  }
  .userInfo img {
    width: 36px; height: 36px; border-radius: 50%;
  }
  .badge {
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 800;
    color: white;
    background: #2ecc71;
  }
  .badge.viewer { background: #95a5a6; }

  /* Secciones */
  .section {
    background-color: #34495e;
    color: white;
    font-weight: 900;
    text-align: center;
    padding: 14px 0;
    margin: 26px auto 0;
    width: 92%;
    border-radius: 10px;
    letter-spacing: 1px;
  }

  /* Tablas / columnas: 6 SIEMPRE en la misma fila */
  .table {
    display: flex;
    gap: 14px;
    padding: 18px 0 0;
    justify-content: center;
    flex-wrap: nowrap;      /* no saltar línea */
    overflow-x: auto;       /* si la pantalla es estrecha, scroll horizontal */
    width: 92%;
    margin: 0 auto 20px;
    box-sizing: border-box;
  }

  .column {
    background-color: white;
    width: 240px;          /* ancho fijo para que entren 6 con scroll si hace falta */
    min-width: 240px;
    height: 340px;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.12);
    padding: 12px;
    overflow-y: auto;
    box-sizing: border-box;
  }

  .column .header {
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 12px;
  }

  /* Personaje */
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
    background-color: #ecf0f1;
    border-radius: 10px;
    cursor: grab;
    user-select: none;
  }
  .row:active { cursor: grabbing; }

  .row img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex: 0 0 auto;
    object-fit: cover;
  }
  .row span {
    font-size: 14px;
    color: #2c3e50;
    font-weight: 700;
    line-height: 1.2;
  }

  .placeholder {
    height: 44px;
    background-color: #bfc5c8;
    border-radius: 10px;
    margin-bottom: 8px;
  }
</style>
</head>

<body>
  <div class="topBar">
    <div id="loginBtn" class="button">Login</div>
    <div id="userArea"></div>
  </div>

  <div id="tiersContainer"></div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    /* ============================
       FIREBASE CONFIG (TUYA)
    ============================ */
    const firebaseConfig = {
      apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
      authDomain: "tier-list-mcoc.firebaseapp.com",
      projectId: "tier-list-mcoc",
      storageBucket: "tier-list-mcoc.firebasestorage.app",
      messagingSenderId: "171313453656",
      appId: "1:171313453656:web:83e1a681425422d8cac82d",
      measurementId: "G-G2Q61X2G0X"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const tierRef = db.collection("tierData").doc("main");

    const OWNER_UID = "HizrEHr3BjgUTyJZsSPoei0gHrA2";

    /* ============================
       ESTRUCTURA
    ============================ */
    const tiers = [
      { id: "new",  label: "PERSONAJES NUEVOS" },
      { id: "god",  label: "GOD TIER" },
      { id: "semi", label: "SEMI-GOD TIER" },
      { id: "usables", label: "USABLES TIER" },
      { id: "ocasionales", label: "OCASIONALES TIER" },
      { id: "meme", label: "MEME TIER" }
    ];

    const classes = ["MUTANTES", "HÁBILES", "CIENTÍFICOS", "MÍSTICOS", "CÓSMICOS", "TECNOS"];

    /* ============================
       AQUÍ AÑADES PERSONAJES A MANO
       (se insertan 1 sola vez, sin duplicar)
    ============================ */
    const MANUAL_CHARACTERS = [
      {
        tier: "new",
        cls: "TECNOS",
        name: "Iron Man (Clásico)",
        image: "https://pbs.twimg.com/media/F5RqSzSXYAA-_Z-?format=png&name=360x360"
      },
      {
        tier: "new",
        cls: "MUTANTES",
        name: "Onslaught",
        image: "https://pbs.twimg.com/media/GAhX3ujXIAIKxIg?format=png&name=360x360"
      }
    ];

    /* ============================
       STATE
    ============================ */
    let isAdmin = false;
    let currentData = null;
    let draggedElement = null;
    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";

    const loginBtn = document.getElementById("loginBtn");
    const userArea = document.getElementById("userArea");

    loginBtn.onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider);
    };

    function logout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
      if (user) {
        isAdmin = (user.uid === OWNER_UID);
        loginBtn.style.display = "none";
        userArea.innerHTML = `
          <div class="userInfo">
            <img src="${user.photoURL}">
            <span style="font-weight:800">${user.displayName}</span>
            <span class="badge ${isAdmin ? '' : 'viewer'}">${isAdmin ? 'ADMIN' : 'VIEWER'}</span>
            <div class="button" onclick="logout()">Cerrar sesión</div>
          </div>
        `;
      } else {
        isAdmin = false;
        loginBtn.style.display = "block";
        userArea.innerHTML = "";
      }
      if (currentData) render(currentData);
    });

    /* ============================
       UI BUILD
    ============================ */
    function buildStructure() {
      const container = document.getElementById("tiersContainer");
      container.innerHTML = "";
      tiers.forEach(t => {
        container.innerHTML += `
          <div class="section">${t.label}</div>
          <div class="table" id="${t.id}"></div>
        `;
      });
    }

    function createTables() {
      tiers.forEach(t => {
        const table = document.getElementById(t.id);
        table.innerHTML = "";
        classes.forEach(cls => {
          const col = document.createElement("div");
          col.className = "column";
          col.dataset.cls = cls;
          col.innerHTML = `<div class="header">${cls}</div>`;

          col.addEventListener("dragover", e => {
            if (!isAdmin) return;
            e.preventDefault();
            const afterElement = getDragAfterElement(col, e.clientY);
            if (!afterElement) col.appendChild(placeholder);
            else col.insertBefore(placeholder, afterElement);
          });

          col.addEventListener("drop", async e => {
            if (!isAdmin) return;
            e.preventDefault();
            if (draggedElement) {
              col.insertBefore(draggedElement, placeholder);
              placeholder.remove();
              await saveData();
            }
          });

          table.appendChild(col);
        });
      });
    }

    function getDragAfterElement(container, y) {
      const els = [...container.querySelectorAll(".row:not(.dragging)")];
      return els.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset, element: child };
        }
        return closest;
      }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
    }

    function createRow(character) {
      const name = typeof character === "string" ? character : character.name;
      const image = (typeof character === "string")
        ? (IMAGE_MAP[name] || DEFAULT_IMG)
        : (character.image || DEFAULT_IMG);

      const r = document.createElement("div");
      r.className = "row";
      r.innerHTML = `<img src="${image}" alt="${name}"><span>${name}</span>`;

      // drag admin
      if (isAdmin) {
        r.draggable = true;
        r.addEventListener("dragstart", () => {
          draggedElement = r;
          r.classList.add("dragging");
        });
        r.addEventListener("dragend", () => {
          r.classList.remove("dragging");
          placeholder.remove();
          draggedElement = null;
        });
      }

      return r;
    }

    /* ============================
       IMÁGENES
       - Para compatibilidad: si en tu BD hay arrays de strings,
         aquí se resuelven a URL.
       - Como YA estamos guardando objetos {name,image},
         esto solo sirve de “fallback”.
    ============================ */
    const DEFAULT_IMG = "https://via.placeholder.com/60?text=?";
    const IMAGE_MAP = {
      "Iron Man (Clásico)": "https://pbs.twimg.com/media/F5RqSzSXYAA-_Z-?format=png&name=360x360",
      "Onslaught": "https://pbs.twimg.com/media/GAhX3ujXIAIKxIg?format=png&name=360x360"
    };

    /* ============================
       SAVE (GUARDA OBJETOS)
    ============================ */
    async function saveData() {
      if (!isAdmin) return;

      const data = {};
      tiers.forEach(t => {
        data[t.id] = {};
        classes.forEach(cls => {
          const arr = [];
          document.querySelectorAll(`#${t.id} [data-cls="${cls}"] .row`).forEach(r => {
            arr.push({
              name: r.querySelector("span").textContent,
              image: r.querySelector("img").src
            });
          });
          data[t.id][cls] = arr;
        });
      });

      await tierRef.set(data);
    }

    /* ============================
       RENDER
    ============================ */
    function render(data) {
      currentData = data;

      buildStructure();
      createTables();

      tiers.forEach(t => {
        classes.forEach(cls => {
          const list = data?.[t.id]?.[cls];
          if (Array.isArray(list)) {
            const target = document.querySelector(`#${t.id} [data-cls="${cls}"]`);
            list.forEach(item => target.appendChild(createRow(item)));
          }
        });
      });
    }

    /* ============================
       INIT + SEED SIN DUPLICADOS
       (EN TRANSACTION para que no se pise ni duplique)
    ============================ */
    async function ensureBaseAndSeed() {
      await db.runTransaction(async (tx) => {
        const snap = await tx.get(tierRef);
        let data = snap.exists ? snap.data() : null;

        // base
        if (!data) {
          data = {};
          tiers.forEach(t => {
            data[t.id] = {};
            classes.forEach(cls => data[t.id][cls] = []);
          });
        } else {
          // asegurar claves
          tiers.forEach(t => {
            if (!data[t.id]) data[t.id] = {};
            classes.forEach(cls => {
              if (!Array.isArray(data[t.id][cls])) data[t.id][cls] = [];
            });
          });
        }

        // seed manual (sin duplicar)
        MANUAL_CHARACTERS.forEach(ch => {
          const arr = data[ch.tier][ch.cls];

          // si la BD tiene strings, convertir a objetos al vuelo al añadir
          const exists = arr.some(x => (typeof x === "string" ? x : x.name) === ch.name);
          if (!exists) {
            arr.push({ name: ch.name, image: ch.image });
          }
        });

        tx.set(tierRef, data);
      });
    }

    async function init() {
      await ensureBaseAndSeed();

      // primera carga
      const snap = await tierRef.get();
      if (snap.exists) render(snap.data());

      // realtime
      tierRef.onSnapshot(doc => {
        if (doc.exists) render(doc.data());
      });
    }

    init();
  </script>
</body>
</html>
