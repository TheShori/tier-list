<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>
<style>
/* 🔥 FUENTE PERSONALIZADA */
@font-face {
  font-family: 'Hanzel';
  src: url('/tier-list/Hanzel-Normal-Font.5cb440da.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

body{
  font-family:'Hanzel', Arial, sans-serif;
  margin:0;
  background:#f3f3f3;
}

.section{
padding:14px;
text-align:center;
font-weight:bold;
font-size:24px;
border:3px solid black;
}

.god{background:#d85c5c}
.semi{background:#e6a764}
.usables{background:#f1d35c}
.ocasionales{background:#5fa94e}
.meme{background:#3f74c8}

.table{
display:flex;
border-left:3px solid black;
border-right:3px solid black;
margin-bottom:40px;
}

.column{
flex:1;
border-right:3px solid black;
background:white;
min-height:200px;
position:relative;
}

.column:last-child{border-right:none}

.header{
background:#444;
color:white;
text-align:center;
padding:8px;
border-bottom:3px solid black;
font-weight:bold;
}

.row{
display:flex;
align-items:center;
padding:6px;
border-bottom:2px solid black;
background:white;
transition:all 0.15s ease;
}

.row.dragging{
opacity:0.4;
}

.row img{
width:28px;
height:28px;
margin-right:6px;
}

/* 🔥 AQUÍ ESTÁ EL CAMBIO */
.row span{
color:black;        /* negro */
text-decoration:none; /* sin subrayado */
font-weight:normal;   /* sin negrita */
font-size:13px;
}

.topBar{
position:fixed;
top:10px;
right:10px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
}

.userInfo{
display:flex;
align-items:center;
gap:8px;
background:white;
padding:6px 10px;
border-radius:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.userInfo img{
width:28px;
height:28px;
border-radius:50%;
}

.button{
padding:6px 10px;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

.adminBadge{
background:#2ecc71;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}

.viewerBadge{
background:#999;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}

.placeholder{
height:40px;
background:rgba(0,0,0,0.1);
border:2px dashed #999;
margin:4px 0;
}
</style>
</head>
<body>

<div class="topBar">
  <div id="loginBtn" class="button">Login</div>
  <div id="userArea"></div>
</div>

<div id="tiersContainer"></div>

<!-- Botón para cargar nueva imagen -->
<input type="file" id="uploadImage" accept="image/*" style="display:none;" />
<button onclick="document.getElementById('uploadImage').click()">Subir nueva imagen</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d",
  measurementId: "G-G2Q61X2G0X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");

const OWNER_UID="HizrEHr3BjgUTyJZsSPoei0gHrA2";

const tiers=[
{id:"god",label:"GOD TIER",class:"god"},
{id:"semi",label:"SEMI-GOD TIER",class:"semi"},
{id:"usables",label:"USABLES TIER",class:"usables"},
{id:"ocasionales",label:"OCASIONALES TIER",class:"ocasionales"},
{id:"meme",label:"MEME TIER",class:"meme"}
];

const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

let isAdmin=false;
let currentData=null;
let draggedElement=null;
let placeholder=document.createElement("div");
placeholder.className="placeholder";

const loginBtn=document.getElementById("loginBtn");
const userArea=document.getElementById("userArea");

loginBtn.onclick=()=>{ 
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
};

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
isAdmin=(user.uid===OWNER_UID);
loginBtn.style.display="none";
userArea.innerHTML=` 
<div class="userInfo">
<img src="${user.photoURL}">
<span>${user.displayName}</span>
${isAdmin?'<div class="adminBadge">ADMIN</div>':'<div class="viewerBadge">VIEWER</div>'}
<div class="button" onclick="logout()">Cerrar sesión</div>
</div>`;
}else{
isAdmin=false;
loginBtn.style.display="block";
userArea.innerHTML="";
}
if(currentData) render(currentData);
});

document.getElementById("uploadImage").addEventListener("change", async (event) => {
    if (event.target.files.length > 0) {
        const file = event.target.files[0];
        const storageRef = firebase.storage().ref("championImages/" + file.name); 
        await storageRef.put(file); 

        const fileURL = await storageRef.getDownloadURL(); 

        updateChampionProfileImage(championId, fileURL); 
    }
});

function updateChampionProfileImage(championId, imageURL) {
    const championRow = document.querySelector(`#${championId} .row img`); 
    if (championRow) {
        championRow.src = imageURL; 
    }
    saveChampionImageToDatabase(championId, imageURL); 
}

async function saveChampionImageToDatabase(championId, imageURL) {
    const championRef = db.collection("champions").doc(championId);
    await championRef.update({
        profileImage: imageURL  
    });
}

function createRow(name, imageUrl) {
    let r = document.createElement("div");
    r.className = "row";
    r.innerHTML = `<img src="${imageUrl}" alt="${name}" /> <span>${name}</span>`;

    if (isAdmin) {
        r.draggable = true;
        r.addEventListener("dragstart", () => {
            draggedElement = r;
            r.classList.add("dragging");
        });
        r.addEventListener("dragend", () => {
            r.classList.remove("dragging");
            placeholder.remove();
            draggedElement = null;
        });
    }
    return r;
}

function render(data) {
    currentData = data;
    buildStructure();
    createTables();
    tiers.forEach((t) => {
        if (data[t.id]) {
            classes.forEach((cls) => {
                if (Array.isArray(data[t.id][cls])) {
                    data[t.id][cls].forEach(async (championId) => {
                        const championRef = db.collection("champions").doc(championId);
                        const doc = await championRef.get();
                        const championData = doc.data();
                        if (championData && championData.profileImage) {
                            document.querySelector(`#${t.id} [data-cls='${cls}']`).appendChild(
                                createRow(championId, championData.profileImage)
                            );
                        }
                    });
                }
            });
        }
    });
}

</script>
</body>
</html>
