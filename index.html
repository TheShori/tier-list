<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

.section{
padding:14px;
text-align:center;
font-weight:bold;
font-size:24px;
border:3px solid black;
}

.god{background:#d85c5c}
.semi{background:#e6a764}
.usables{background:#f1d35c}
.ocasionales{background:#5fa94e}
.meme{background:#3f74c8}

.table{
display:flex;
border-left:3px solid black;
border-right:3px solid black;
margin-bottom:40px;
}

.column{
flex:1;
border-right:3px solid black;
background:white;
min-height:200px;
}

.column:last-child{border-right:none}

.header{
background:#444;
color:white;
text-align:center;
padding:8px;
border-bottom:3px solid black;
font-weight:bold;
}

.row{
display:flex;
align-items:center;
padding:4px;
border-bottom:2px solid black;
background:white;
}

.row img{
width:28px;
height:28px;
margin-right:6px;
}

.row span{
color:red;
text-decoration:underline;
font-weight:bold;
font-size:13px;
}

.topBar{
position:fixed;
top:10px;
right:10px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
}

.userInfo{
display:flex;
align-items:center;
gap:8px;
background:white;
padding:6px 10px;
border-radius:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.userInfo img{
width:28px;
height:28px;
border-radius:50%;
}

.button{
padding:6px 10px;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

.adminBadge{
background:#2ecc71;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}

.viewerBadge{
background:#999;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}
</style>
</head>
<body>

<div class="topBar">
  <div id="loginBtn" class="button">Login</div>
  <div id="userArea"></div>
</div>

<div id="tiersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d",
  measurementId: "G-G2Q61X2G0X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");

const OWNER_UID="HizrEHr3BjgUTyJZsSPoei0gHrA2";

const tiers=[
{id:"god",label:"GOD TIER",class:"god"},
{id:"semi",label:"SEMI-GOD TIER",class:"semi"},
{id:"usables",label:"USABLES TIER",class:"usables"},
{id:"ocasionales",label:"OCASIONALES TIER",class:"ocasionales"},
{id:"meme",label:"MEME TIER",class:"meme"}
];

const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

let isAdmin=false;
let currentData=null;

const loginBtn=document.getElementById("loginBtn");
const userArea=document.getElementById("userArea");

loginBtn.onclick=()=>{
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
};

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
isAdmin=(user.uid===OWNER_UID);
loginBtn.style.display="none";
userArea.innerHTML=`
<div class="userInfo">
<img src="${user.photoURL}">
<span>${user.displayName}</span>
${isAdmin?'<div class="adminBadge">ADMIN</div>':'<div class="viewerBadge">VIEWER</div>'}
<div class="button" onclick="logout()">Cerrar sesión</div>
</div>`;
}else{
isAdmin=false;
loginBtn.style.display="block";
userArea.innerHTML="";
}
if(currentData) render(currentData);
});

function buildStructure(){
const container=document.getElementById("tiersContainer");
container.innerHTML="";
tiers.forEach(t=>{
container.innerHTML+=`
<div class="section ${t.class}">${t.label}</div>
<div class="table" id="${t.id}"></div>
`;
});
}

function createTables(){
tiers.forEach(t=>{
const table=document.getElementById(t.id);
table.innerHTML="";
classes.forEach(cls=>{
let col=document.createElement("div");
col.className="column";
col.dataset.cls=cls;
col.innerHTML="<div class='header'>"+cls+"</div>";

if(isAdmin){
col.ondragover=e=>e.preventDefault();
col.ondrop=e=>{
let id=e.dataTransfer.getData("id");
let dragged=document.getElementById(id);
if(dragged){
col.appendChild(dragged);
saveData();
}
};
}

table.appendChild(col);
});
});
}

function createRow(name){
let r=document.createElement("div");
r.className="row";
r.id="r"+Math.random();
r.innerHTML="<img src='https://ui-avatars.com/api/?name="+encodeURIComponent(name)+"&background=random&color=fff'><span>"+name+"</span>";

if(isAdmin){
r.draggable=true;
r.style.cursor="grab";
r.ondragstart=e=>{
e.dataTransfer.setData("id",r.id);
};
}

return r;
}

async function saveData(){
if(!isAdmin)return;

let data={};
tiers.forEach(t=>{
data[t.id]={};
classes.forEach(cls=>{
data[t.id][cls]=[];
document.querySelectorAll("#"+t.id+" [data-cls='"+cls+"'] .row")
.forEach(r=>{
data[t.id][cls].push(r.querySelector("span").textContent);
});
});
});
await tierRef.set(data);
}

function render(data){
currentData=data;
buildStructure();
createTables();

tiers.forEach(t=>{
if(data[t.id]){
classes.forEach(cls=>{
if(Array.isArray(data[t.id][cls])){
data[t.id][cls].forEach(name=>{
document.querySelector("#"+t.id+" [data-cls='"+cls+"']")
.appendChild(createRow(name));
});
}
});
}
});
}

/* 🔥 AUTO SCROLL MIENTRAS ARRASTRAS */

document.addEventListener("dragover", e=>{
if(!isAdmin) return;

const scrollZone=100;
const scrollSpeed=15;

if(e.clientY < scrollZone){
window.scrollBy(0,-scrollSpeed);
}

if(e.clientY > window.innerHeight - scrollZone){
window.scrollBy(0,scrollSpeed);
}
});

async function init(){
let snap=await tierRef.get();

if(!snap.exists){
let baseData={};
tiers.forEach(t=>{
baseData[t.id]={};
classes.forEach(cls=>{
baseData[t.id][cls]=[];
});
});
await tierRef.set(baseData);
render(baseData);
}else{
render(snap.data());
}

tierRef.onSnapshot(doc=>{
if(doc.exists) render(doc.data());
});
}

buildStructure();
init();

</script>
</body>
</html>
