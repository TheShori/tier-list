<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dcdcdc;
}

.topBar{
  background:#34495e;
  padding:20px 40px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.userCard{
  display:flex;
  align-items:center;
  gap:15px;
  background:#3f556b;
  padding:12px 20px;
  border-radius:40px;
  color:white;
}

.userCard img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.badge{
  background:#2ecc71;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
}

.section{
  margin:40px auto 20px;
  width:90%;
  background:#3f556b;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.table{
  width:90%;
  margin:auto;
  display:flex;
  justify-content:space-between;
  gap:20px;
}

.column{
  flex:1;
  background:#eee;
  border-radius:12px;
  padding:15px;
  min-height:300px;
}

.header{
  font-weight:bold;
  text-align:center;
  margin-bottom:15px;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  background:#d5d8dc;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

.row img{
  width:30px;
  height:30px;
  border-radius:50%;
}
</style>
</head>
<body>

<div class="topBar" id="topBar"></div>
<div id="tiersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tierRef = db.collection("tierData").doc("main");

const tiers = [
  {id:"new", label:"PERSONAJES NUEVOS"},
  {id:"god", label:"GOD TIER"},
  {id:"semi", label:"SEMI-GOD"},
  {id:"usables", label:"USABLES"},
  {id:"ocasionales", label:"OCASIONALES"},
  {id:"meme", label:"MEME"}
];

const classes = ["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

let currentData=null;

/* BUILD UI */

function buildStructure(){
  const container=document.getElementById("tiersContainer");
  container.innerHTML="";
  tiers.forEach(t=>{
    container.innerHTML+=`
      <div class="section">${t.label}</div>
      <div class="table" id="${t.id}"></div>`;
  });
}

function createTables(){
  tiers.forEach(t=>{
    const table=document.getElementById(t.id);
    table.innerHTML="";
    classes.forEach(cls=>{
      let col=document.createElement("div");
      col.className="column";
      col.dataset.cls=cls;
      col.innerHTML=`<div class="header">${cls}</div>`;
      table.appendChild(col);
    });
  });
}

function createRow(character){
  let r=document.createElement("div");
  r.className="row";
  r.innerHTML=`<img src="${character.image}"><span>${character.name}</span>`;
  return r;
}

function render(data){
  currentData=data;
  buildStructure();
  createTables();

  tiers.forEach(t=>{
    classes.forEach(cls=>{
      if(data[t.id][cls]){
        data[t.id][cls].forEach(char=>{
          document.querySelector(`#${t.id} [data-cls="${cls}"]`)
          .appendChild(createRow(char));
        });
      }
    });
  });
}

/* INIT */

async function init(){

  let snap=await tierRef.get();

  if(!snap.exists){
    let base={};
    tiers.forEach(t=>{
      base[t.id]={};
      classes.forEach(cls=>base[t.id][cls]=[]);
    });
    await tierRef.set(base);
    snap=await tierRef.get();
  }

  let data=snap.data();

  /* INSERTAR PERSONAJES MANUALES AQUÍ */
  function addIfMissing(tier,cls,name,image){
    if(!data[tier][cls].some(c=>c.name===name)){
      data[tier][cls].push({name,image});
    }
  }

  addIfMissing("new","TECNOS",
    "Iron Man (Clásico)",
    "https://pbs.twimg.com/media/F5RqSzSXYAA-_Z-?format=png&name=360x360"
  );

  addIfMissing("new","MUTANTES",
    "Onslaught",
    "https://pbs.twimg.com/media/GAhX3ujXIAIKxIg?format=png&name=360x360"
  );

  await tierRef.set(data);

  render(data);

  tierRef.onSnapshot(doc=>{
    if(doc.exists) render(doc.data());
  });
}

init();

</script>
</body>
</html>
