<script>
const PASSWORD = "1234";
const classes = ["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];
let editMode = false;

/* DATOS INICIALES */
const defaultData = {
  god: {
    MUTANTES:["Magneto","Onslaught","Domino"],
    HÁBILES:["Shang Chi","Kate Bishop"],
    CIENTÍFICOS:["Hulk","Blue Marvel"],
    MÍSTICOS:["Doctor Doom"],
    CÓSMICOS:["Hercules"],
    TECNOS:["Shuri"]
  },
  semi: {
    MUTANTES:["Bishop","Profesor X"],
    HÁBILES:["Black Cat"],
    CIENTÍFICOS:["Mister Negative"],
    MÍSTICOS:["Wiccan"],
    CÓSMICOS:["Hyperion"],
    TECNOS:["Guardian"]
  }
};

/* CREAR TABLAS */
function createTables(){
  ["godTable","semiTable"].forEach(tableId=>{
    const table = document.getElementById(tableId);
    table.innerHTML = "";

    classes.forEach(cls=>{
      const column = document.createElement("div");
      column.className = "column";
      column.dataset.class = cls;

      const header = document.createElement("div");
      header.className = "column-header";
      header.textContent = cls;
      column.appendChild(header);

      column.ondragover = e => e.preventDefault();
      column.ondrop = e=>{
        if(!editMode) return;
        const id = e.dataTransfer.getData("text");
        column.appendChild(document.getElementById(id));
        saveData();
      };

      table.appendChild(column);
    });
  });
}

/* CREAR FILA */
function createRow(name){
  const row = document.createElement("div");
  row.className = "row";
  row.draggable = true;
  row.id = "row-"+Math.random();

  const img = "https://ui-avatars.com/api/?name="+encodeURIComponent(name)+"&background=random&color=fff";

  row.innerHTML = "<img src='"+img+"'><span>"+name+"</span>";

  row.ondragstart = e=>{
    if(!editMode) return;
    e.dataTransfer.setData("text",row.id);
  };

  return row;
}

/* CARGAR DATOS */
function loadData(){
  const saved = localStorage.getItem("tierData");
  const data = saved ? JSON.parse(saved) : defaultData;

  Object.keys(data).forEach(tier=>{
    const tableId = tier==="god" ? "godTable" : "semiTable";

    classes.forEach(cls=>{
      if(data[tier][cls]){
        data[tier][cls].forEach(name=>{
          const column = document.querySelector("#"+tableId+" [data-class='"+cls+"']");
          if(column){
            column.appendChild(createRow(name));
          }
        });
      }
    });
  });
}

/* GUARDAR */
function saveData(){
  const data = {god:{}, semi:{}};

  ["godTable","semiTable"].forEach(tableId=>{
    const tierName = tableId==="godTable" ? "god" : "semi";

    classes.forEach(cls=>{
      data[tierName][cls] = [];

      document.querySelectorAll("#"+tableId+" [data-class='"+cls+"'] .row")
      .forEach(row=>{
        data[tierName][cls].push(row.querySelector("span").textContent);
      });

    });
  });

  localStorage.setItem("tierData", JSON.stringify(data));
}

/* EDIT MODE */
function activateEdit(){
  const pass = prompt("Contraseña:");
  if(pass===PASSWORD){
    editMode = true;
    document.getElementById("controls").style.display="block";
    alert("Modo edición activado");
  } else {
    alert("Incorrecta");
  }
}

/* AÑADIR */
function addCharacter(){
  const name = document.getElementById("nameInput").value;
  const tier = document.getElementById("tierSelect").value;
  const cls = document.getElementById("classSelect").value;

  if(!name) return;

  const tableId = tier==="god" ? "godTable" : "semiTable";
  const column = document.querySelector("#"+tableId+" [data-class='"+cls+"']");

  if(column){
    column.appendChild(createRow(name));
    saveData();
  }

  document.getElementById("nameInput").value="";
}

/* INIT */
createTables();
loadData();
</script>
