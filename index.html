<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tier Test</title>
<style>
body{font-family:Arial;margin:0}
.box{border:2px solid black;margin:10px;padding:10px}
.item{padding:5px;margin:5px;border:1px solid black}
</style>
</head>
<body>

<h1>Tier funcionando</h1>

<div id="god" class="box"></div>
<div id="semi" class="box"></div>

<script>
console.log("JS cargado correctamente");

const defaultData={
god:["Magneto","Onslaught","Domino"],
semi:["Bishop","Hyperion"]
};

function load(){
console.log("Cargando datos...");

Object.keys(defaultData).forEach(tier=>{
let container=document.getElementById(tier);
defaultData[tier].forEach(name=>{
let div=document.createElement("div");
div.className="item";
div.textContent=name;
container.appendChild(div);
});
});

console.log("Datos cargados correctamente");
}

load();
</script>

</body>
</html>
