<script>
const PASSWORD="1234";
const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];
let editMode=false;

/* DATOS BASE */
const defaultData={
god:{
MUTANTES:["Magneto","Onslaught","Domino"],
HÁBILES:["Shang Chi","Kate Bishop"],
CIENTÍFICOS:["Hulk","Blue Marvel"],
MÍSTICOS:["Doctor Doom"],
CÓSMICOS:["Hercules"],
TECNOS:["Shuri"]
},
semi:{
MUTANTES:["Bishop","Profesor X"],
HÁBILES:["Black Cat"],
CIENTÍFICOS:["Mister Negative"],
MÍSTICOS:["Wiccan"],
CÓSMICOS:["Hyperion"],
TECNOS:["Guardian"]
}
};

/* CREAR TABLAS */
function createTables(){
["godTable","semiTable"].forEach(id=>{
const table=document.getElementById(id);
table.innerHTML="";
classes.forEach(cls=>{
    const col=document.createElement("div");
    col.className="column";
    col.dataset.class=cls;
    col.dataset.table=id;

    const header=document.createElement("div");
    header.className="column-header";
    header.textContent=cls;
    col.appendChild(header);

    col.ondragover=e=>e.preventDefault();
    col.ondrop=e=>{
        if(!editMode) return;
        const dragged=e.dataTransfer.getData("text");
        col.appendChild(document.getElementById(dragged));
        saveData();
    };

    table.appendChild(col);
});
});
}

/* CREAR FILA */
function createRow(name){
const row=document.createElement("div");
row.className="row";
row.draggable=true;
row.id="row-"+Date.now()+Math.random();

const img=`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;

row.innerHTML=`<img src="${img}"><span>${name}</span>`;

row.ondragstart=e=>{
if(!editMode) return;
e.dataTransfer.setData("text",row.id);
};

return row;
}

/* GUARDAR */
function saveData(){
const data={god:{},semi:{}};

["godTable","semiTable"].forEach(id=>{
const tier=id==="godTable"?"god":"semi";

classes.forEach(cls=>{
data[tier][cls]=[];

document.querySelectorAll(`#${id} [data-class='${cls}'] .row`)
.forEach(row=>{
data[tier][cls].push(row.querySelector("span").textContent);
});

});
});

localStorage.setItem("tierData",JSON.stringify(data));
}

/* CARGAR */
function loadData(){
const saved=localStorage.getItem("tierData");
if(saved){
return JSON.parse(saved);
}
return defaultData;
}

/* ACTIVAR EDIT */
function activateEdit(){
const pass=prompt("Contraseña:");
if(pass===PASSWORD){
editMode=true;
document.getElementById("controls").style.display="block";
alert("Modo edición activado");
}else{
alert("Incorrecta");
}
}

/* AÑADIR */
function addCharacter(){
const name=document.getElementById("nameInput").value;
const tier=document.getElementById("tierSelect").value;
const cls=document.getElementById("classSelect").value;

if(!name) return;

const tableId=tier==="god"?"godTable":"semiTable";

document.querySelector(`#${tableId} [data-class='${cls}']`)
.appendChild(createRow(name));

document.getElementById("nameInput").value="";
saveData();
}

/* RESET OPCIONAL */
function resetData(){
localStorage.removeItem("tierData");
location.reload();
}

/* INIT */
createTables();
loadData();

const data=loadData();
Object.keys(data).forEach(tier=>{
const tableId=tier==="god"?"godTable":"semiTable";
classes.forEach(cls=>{
if(data[tier][cls]){
data[tier][cls].forEach(name=>{
document.querySelector(`#${tableId} [data-class='${cls}']`)
.appendChild(createRow(name));
});
}
});
});
</script>
