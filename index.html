<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>

/* 🔥 FUENTE PERSONALIZADA */
@font-face {
  font-family: 'Hanzel';
  src: url('./Hanzel-Normal-Font.5cb440da.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

/* Aplicamos la fuente a TODA la web */
body{
  font-family:'Hanzel', Arial, sans-serif;
  margin:0;
  background:#f3f3f3;
}

/* El resto del CSS permanece igual */

.section{
padding:14px;
text-align:center;
font-weight:bold;
font-size:24px;
border:3px solid black;
}

.god{background:#d85c5c}
.semi{background:#e6a764}
.usables{background:#f1d35c}
.ocasionales{background:#5fa94e}
.meme{background:#3f74c8}

.table{
display:flex;
border-left:3px solid black;
border-right:3px solid black;
margin-bottom:40px;
}

.column{
flex:1;
border-right:3px solid black;
background:white;
min-height:200px;
position:relative;
}

.column:last-child{border-right:none}

.header{
background:#444;
color:white;
text-align:center;
padding:8px;
border-bottom:3px solid black;
font-weight:bold;
}

.row{
display:flex;
align-items:center;
padding:6px;
border-bottom:2px solid black;
background:white;
transition:transform 0.15s ease, box-shadow 0.15s ease;
}

.row img{
width:28px;
height:28px;
margin-right:6px;
}

.row span{
color:red;
text-decoration:underline;
font-weight:bold;
font-size:13px;
}

.topBar{
position:fixed;
top:10px;
right:10px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
}

.userInfo{
display:flex;
align-items:center;
gap:8px;
background:white;
padding:6px 10px;
border-radius:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.userInfo img{
width:28px;
height:28px;
border-radius:50%;
}

.button{
padding:6px 10px;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

.adminBadge{
background:#2ecc71;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}

.viewerBadge{
background:#999;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
}

</style>
</head>
<body>
