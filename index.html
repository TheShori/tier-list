<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>

@font-face {
  font-family: 'Hanzel';
  src: url('/tier-list/Hanzel-Normal-Font.5cb440da.ttf') format('truetype');
}

body{
  font-family:'Hanzel', Arial, sans-serif;
  margin:0;
  background:#f3f3f3;
}

.section{
padding:14px;
text-align:center;
font-weight:bold;
font-size:24px;
border:3px solid black;
}

.god{background:#d85c5c}
.semi{background:#e6a764}
.usables{background:#f1d35c}
.ocasionales{background:#5fa94e}
.meme{background:#3f74c8}

.table{
display:flex;
border-left:3px solid black;
border-right:3px solid black;
margin-bottom:40px;
}

.column{
flex:1;
border-right:3px solid black;
background:white;
min-height:200px;
position:relative;
}

.column:last-child{border-right:none}

.header{
background:#444;
color:white;
text-align:center;
padding:8px;
border-bottom:3px solid black;
font-weight:bold;
}

.row{
display:flex;
align-items:center;
padding:6px;
border-bottom:2px solid black;
background:white;
cursor:pointer;
transition:all 0.15s ease;
}

.row span{
color:black;
font-weight:normal;
font-size:13px;
}

.row img{
width:28px;
height:28px;
margin-right:6px;
}

.placeholder{
height:40px;
background:rgba(0,0,0,0.1);
border:2px dashed #999;
margin:4px 0;
}

/* 🔥 MODAL */

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal{
background:white;
width:600px;
max-width:95%;
padding:20px;
border-radius:8px;
display:flex;
gap:20px;
}

.modal img{
width:180px;
height:180px;
object-fit:cover;
border-radius:6px;
background:#eee;
}

.modalContent{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input,
.modal textarea{
width:100%;
padding:6px;
font-family:inherit;
}

.modal textarea{
height:120px;
resize:none;
}

.modalButtons{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:10px;
}

.button{
padding:6px 10px;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

.topBar{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:1000;
}

</style>
</head>
<body>

<div class="topBar">
  <div id="loginBtn" class="button">Login</div>
  <div id="userArea"></div>
</div>

<div id="tiersContainer"></div>

<!-- 🔥 MODAL -->
<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <img id="modalImage">
    <div class="modalContent">
      <input id="modalName" placeholder="Nombre del personaje">
      <input id="modalImageUrl" placeholder="URL de la imagen">
      <textarea id="modalInfo" placeholder="Información importante..."></textarea>
      <div class="modalButtons">
        <div class="button" onclick="closeModal()">Cerrar</div>
        <div class="button" id="saveBtn">Guardar</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d",
  measurementId: "G-G2Q61X2G0X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");

const OWNER_UID="HizrEHr3BjgUTyJZsSPoei0gHrA2";

let isAdmin=false;
let currentData=null;
let selectedCharacter=null;

const tiers=[
{id:"god",label:"GOD TIER",class:"god"},
{id:"semi",label:"SEMI-GOD TIER",class:"semi"},
{id:"usables",label:"USABLES TIER",class:"usables"},
{id:"ocasionales",label:"OCASIONALES TIER",class:"ocasionales"},
{id:"meme",label:"MEME TIER",class:"meme"}
];

const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

auth.onAuthStateChanged(user=>{
isAdmin=user && user.uid===OWNER_UID;
});

function buildStructure(){
const container=document.getElementById("tiersContainer");
container.innerHTML="";
tiers.forEach(t=>{
container.innerHTML+=`
<div class="section ${t.class}">${t.label}</div>
<div class="table" id="${t.id}"></div>
`;
});
}

function createTables(){
tiers.forEach(t=>{
const table=document.getElementById(t.id);
table.innerHTML="";
classes.forEach(cls=>{
let col=document.createElement("div");
col.className="column";
col.dataset.cls=cls;
col.innerHTML="<div class='header'>"+cls+"</div>";
table.appendChild(col);
});
});
}

function createRow(character){
let r=document.createElement("div");
r.className="row";
r.innerHTML="<span>"+character.name+"</span>";

r.onclick=()=>openModal(character);

return r;
}

function openModal(character){
selectedCharacter=character;
document.getElementById("modalOverlay").style.display="flex";
document.getElementById("modalName").value=character.name||"";
document.getElementById("modalImageUrl").value=character.image||"";
document.getElementById("modalInfo").value=character.info||"";
document.getElementById("modalImage").src=character.image||"";
document.getElementById("saveBtn").style.display=isAdmin?"block":"none";
}

function closeModal(){
document.getElementById("modalOverlay").style.display="none";
}

document.getElementById("modalImageUrl").addEventListener("input",e=>{
document.getElementById("modalImage").src=e.target.value;
});

document.getElementById("saveBtn").onclick=async()=>{
if(!isAdmin)return;

selectedCharacter.name=document.getElementById("modalName").value;
selectedCharacter.image=document.getElementById("modalImageUrl").value;
selectedCharacter.info=document.getElementById("modalInfo").value;

await tierRef.set(currentData);
closeModal();
};

async function render(data){
currentData=data;
buildStructure();
createTables();

tiers.forEach(t=>{
classes.forEach(cls=>{
if(data[t.id] && data[t.id][cls]){
data[t.id][cls].forEach(char=>{
document.querySelector("#"+t.id+" [data-cls='"+cls+"']")
.appendChild(createRow(char));
});
}
});
});
}

async function init(){
let snap=await tierRef.get();
if(!snap.exists){
let baseData={};
tiers.forEach(t=>{
baseData[t.id]={};
classes.forEach(cls=>{
baseData[t.id][cls]=[];
});
});
await tierRef.set(baseData);
render(baseData);
}else{
render(snap.data());
}
tierRef.onSnapshot(doc=>{
if(doc.exists) render(doc.data());
});
}

buildStructure();
init();

</script>
</body>
</html>
