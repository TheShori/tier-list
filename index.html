<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tier List MCOC PRO</title>

  <style>
    /* 🔥 FUENTE PERSONALIZADA */
    @font-face {
      font-family: 'Hanzel';
      src: url('/tier-list/Hanzel-Normal-Font.5cb440da.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body{
      font-family:'Hanzel', Arial, sans-serif;
      margin:0;
      background:#f3f3f3;
    }

    .section{
      padding:14px;
      text-align:center;
      font-weight:bold;
      font-size:24px;
      border:3px solid black;
    }

    .god{background:#d85c5c}
    .semi{background:#e6a764}
    .usables{background:#f1d35c}
    .ocasionales{background:#5fa94e}
    .meme{background:#3f74c8}

    .table{
      display:flex;
      border-left:3px solid black;
      border-right:3px solid black;
      margin-bottom:40px;
    }

    .column{
      flex:1;
      border-right:3px solid black;
      background:white;
      min-height:200px;
      position:relative;
    }

    .column:last-child{border-right:none}

    .header{
      background:#444;
      color:white;
      text-align:center;
      padding:8px;
      border-bottom:3px solid black;
      font-weight:bold;
    }

    .row{
      display:flex;
      align-items:center;
      padding:6px;
      border-bottom:2px solid black;
      background:white;
      transition:all 0.15s ease;
    }

    .row.dragging{
      opacity:0.4;
    }

    .row img{
      width:28px;
      height:28px;
      margin-right:6px;
    }

    .row span{
      color:black;        
      font-weight:normal;
      font-size:13px;
    }

    .topBar{
      position:fixed;
      top:10px;
      right:10px;
      display:flex;
      align-items:center;
      gap:10px;
      z-index:1000;
    }

    .userInfo{
      display:flex;
      align-items:center;
      gap:8px;
      background:white;
      padding:6px 10px;
      border-radius:20px;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }

    .userInfo img{
      width:28px;
      height:28px;
      border-radius:50%;
    }

    .button{
      padding:6px 10px;
      background:black;
      color:white;
      cursor:pointer;
      border-radius:6px;
    }

    .adminBadge{
      background:#2ecc71;
      color:white;
      padding:4px 8px;
      border-radius:12px;
      font-size:12px;
    }

    .viewerBadge{
      background:#999;
      color:white;
      padding:4px 8px;
      border-radius:12px;
      font-size:12px;
    }

    .placeholder{
      height:40px;
      background:rgba(0,0,0,0.1);
      border:2px dashed #999;
      margin:4px 0;
    }

    /* 🔥 NUEVO MENÚ ADMIN */
    .adminMenu {
      padding: 15px;
      background: #f4f4f4;
      border: 3px solid #ddd;
      margin: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .adminMenu input, .adminMenu textarea {
      padding: 8px;
      font-size: 14px;
      margin-bottom: 10px;
      width: 100%;
    }

    .newCharacters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .newCharacterCard {
      width: 150px;
      height: 200px;
      background: #e1e1e1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px;
      border-radius: 8px;
      cursor: pointer;
    }

    .newCharacterCard img {
      width: 50px;
      height: 50px;
    }

  </style>
</head>
<body>

<div class="topBar">
  <div id="loginBtn" class="button">Login</div>
  <div id="userArea"></div>
</div>

<!-- Menú para Administrador -->
<div id="adminMenu" class="adminMenu" style="display: none;">
  <input id="newCharName" type="text" placeholder="Nombre del personaje">
  <input id="newCharImage" type="url" placeholder="URL de la imagen">
  <textarea id="newCharInfo" placeholder="Información del personaje"></textarea>
  <div class="button" id="addNewCharacterBtn">Añadir Personaje</div>
</div>

<!-- Nueva Sección de Personajes Pendientes -->
<div class="section">Nuevos Personajes</div>
<div class="table" id="newCharactersContainer"></div>

<div id="tiersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d",
  measurementId: "G-G2Q61X2G0X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");

const OWNER_UID="HizrEHr3BjgUTyJZsSPoei0gHrA2";

let isAdmin=false;
let currentData=null;

const tiers=["god","semi","usables","ocasionales","meme"];
const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

document.getElementById("loginBtn").onclick=()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user=>{
  if(user){
    isAdmin=user.uid===OWNER_UID;
    loginBtn.style.display="none";
    userArea.innerHTML=`
      <div class="userInfo">
        <img src="${user.photoURL}">
        <span>${user.displayName}</span>
        <div class="button" onclick="logout()">Cerrar sesión</div>
      </div>`;

    // Mostrar menú de admin
    if (isAdmin) {
      document.getElementById("adminMenu").style.display = 'block';
    } else {
      document.getElementById("adminMenu").style.display = 'none';
    }
  } else {
    isAdmin=false;
    loginBtn.style.display="block";
    userArea.innerHTML="";
    document.getElementById("adminMenu").style.display = 'none'; // Ocultar menú admin
  }
});

function logout() {
  auth.signOut();
}

// Agregar nuevo personaje
document.getElementById("addNewCharacterBtn").onclick = () => {
  const name = document.getElementById("newCharName").value;
  const image = document.getElementById("newCharImage").value;
  const info = document.getElementById("newCharInfo").value;

  if (name && image) {
    const newCharacter = { name, image, info };
    addNewCharacter(newCharacter);
  }
};

// Guardar nuevo personaje en la colección "nuevos"
function addNewCharacter(character) {
  const newCharacterContainer = document.getElementById("newCharactersContainer");
  const newCharacterCard = document.createElement("div");
  newCharacterCard.className = "newCharacterCard";
  newCharacterCard.innerHTML = `
    <img src="${character.image}" alt="${character.name}">
    <span>${character.name}</span>
  `;

  newCharacterCard.onclick = () => {
    // Puedes implementar aquí la lógica para moverlo a la tier list
    alert('¡Ahora puedes arrastrar este personaje!');
  };

  newCharacterContainer.appendChild(newCharacterCard);

  // Agregar personaje a Firestore
  tierRef.collection('newCharacters').add(character);
}

// Construcción de la estructura de tiers
function buildStructure() {
  const container = document.getElementById("tiersContainer");
  container.innerHTML = "";
  tiers.forEach(t => {
    container.innerHTML += `
      <div class="section ${t}">${t.toUpperCase()}</div>
      <div class="table" id="${t}"></div>
    `;
  });
}

// Función para guardar datos en Firestore
async function saveData() {
  if (!isAdmin) return;
  let data = {};
  tiers.forEach(t => {
    data[t] = {};
    classes.forEach(cls => {
      data[t][cls] = [];
      document.querySelectorAll(`#${t} [data-cls='${cls}'] .row`)
        .forEach(r => {
          data[t][cls].push(r.querySelector("span").textContent);
        });
    });
  });
  await tierRef.set(data);
}

// Función para renderizar los datos de Firestore
function render(data) {
  currentData = data;
  buildStructure();

  tiers.forEach(t => {
    if (data[t]) {
      classes.forEach(cls => {
        if (data[t][cls]) {
          data[t][cls].forEach(char => {
            document.querySelector(`#${t} [data-cls='${cls}']`)
              .appendChild(createRow(char));
          });
        }
      });
    }
  });
}

// Función para crear las filas
function createRow(name) {
  let r = document.createElement("div");
  r.className = "row";
  r.innerHTML = `<img src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff'><span>${name}</span>`;
  return r;
}

async function init() {
  let snap = await tierRef.get();
  if (!snap.exists) {
    let baseData = {};
    tiers.forEach(t => {
      baseData[t] = {};
      classes.forEach(cls => {
        baseData[t][cls] = [];
      });
    });
    await tierRef.set(baseData);
    render(baseData);
  } else {
    render(snap.data());
  }

  tierRef.onSnapshot(doc => {
    if (doc.exists) render(doc.data());
  });
}

init();

</script>

</body>
</html>
