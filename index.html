<script>
const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

const defaultData={
god:{
MUTANTES:["Magneto","Onslaught"],
HÁBILES:["Shang Chi"],
CIENTÍFICOS:["Hulk"],
MÍSTICOS:["Doom"],
CÓSMICOS:["Hercules"],
TECNOS:["Shuri"]
},
semi:{
MUTANTES:["Bishop"],
HÁBILES:["Black Cat"],
CIENTÍFICOS:["Negative"],
MÍSTICOS:["Wiccan"],
CÓSMICOS:["Hyperion"],
TECNOS:["Guardian"]
}
};

function createTables(){
["god","semi"].forEach(tier=>{
let table=document.getElementById(tier);
table.innerHTML="";
classes.forEach(cls=>{
let col=document.createElement("div");
col.className="column";
col.innerHTML="<div class='header'>"+cls+"</div>";
col.dataset.cls=cls;

col.ondragover=e=>e.preventDefault();
col.ondrop=e=>{
let id=e.dataTransfer.getData("id");
col.appendChild(document.getElementById(id));
save(); // 🔥 guardamos al mover
};

table.appendChild(col);
});
});
}

function createRow(name){
let r=document.createElement("div");
r.className="row";
r.draggable=true;
r.id="r"+Math.random();
r.innerHTML="<img src='https://ui-avatars.com/api/?name="+encodeURIComponent(name)+"&background=random&color=fff'><span>"+name+"</span>";
r.ondragstart=e=>{
e.dataTransfer.setData("id",r.id);
};
return r;
}

function load(){
let saved=localStorage.getItem("tierData");
let data=saved?JSON.parse(saved):defaultData;

Object.keys(data).forEach(tier=>{
classes.forEach(cls=>{
data[tier][cls].forEach(name=>{
document.querySelector("#"+tier+" [data-cls='"+cls+"']").appendChild(createRow(name));
});
});
});
}

function save(){
let data={god:{},semi:{}};

["god","semi"].forEach(tier=>{
classes.forEach(cls=>{
data[tier][cls]=[];
document.querySelectorAll("#"+tier+" [data-cls='"+cls+"'] .row")
.forEach(r=>{
data[tier][cls].push(r.querySelector("span").textContent);
});
});
});

localStorage.setItem("tierData",JSON.stringify(data));
}

createTables();
load();
</script>
