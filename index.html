<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC Online</title>

<style>
body{font-family:Arial;margin:0;background:#f3f3f3}
.section{padding:14px;text-align:center;font-weight:bold;font-size:24px;border:3px solid black}
.god{background:#d85c5c}
.semi{background:#e6a764}
.table{display:flex;border-left:3px solid black;border-right:3px solid black;margin-bottom:40px}
.column{flex:1;border-right:3px solid black;background:white;min-height:220px}
.column:last-child{border-right:none}
.header{background:#444;color:white;text-align:center;padding:8px;border-bottom:3px solid black;font-weight:bold}
.row{display:flex;align-items:center;padding:4px;border-bottom:2px solid black;cursor:grab}
.row img{width:28px;height:28px;margin-right:6px}
.row span{color:red;text-decoration:underline;font-weight:bold;font-size:13px}
</style>
</head>

<body>

<div class="section god">GOD TIER</div>
<div class="table" id="god"></div>

<div class="section semi">SEMI-GOD TIER</div>
<div class="table" id="semi"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d",
  measurementId: "G-G2Q61X2G0X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tierRef = db.collection("tierData").doc("main");

const classes=["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

const defaultData={
god:{
MUTANTES:["Magneto","Onslaught"],
HÁBILES:["Shang Chi"],
CIENTÍFICOS:["Hulk"],
MÍSTICOS:["Doctor Doom"],
CÓSMICOS:["Hercules"],
TECNOS:["Shuri"]
},
semi:{
MUTANTES:["Bishop"],
HÁBILES:["Black Cat"],
CIENTÍFICOS:["Mister Negative"],
MÍSTICOS:["Wiccan"],
CÓSMICOS:["Hyperion"],
TECNOS:["Guardian"]
}
};

function createTables(){
["god","semi"].forEach(tier=>{
const table=document.getElementById(tier);
table.innerHTML="";
classes.forEach(cls=>{
let col=document.createElement("div");
col.className="column";
col.dataset.cls=cls;
col.innerHTML="<div class='header'>"+cls+"</div>";

col.ondragover=e=>e.preventDefault();
col.ondrop=e=>{
let id=e.dataTransfer.getData("id");
let dragged=document.getElementById(id);
if(dragged){
col.appendChild(dragged);
saveData();
}
};

table.appendChild(col);
});
});
}

function createRow(name){
let r=document.createElement("div");
r.className="row";
r.draggable=true;
r.id="r"+Math.random();

r.innerHTML="<img src='https://ui-avatars.com/api/?name="+encodeURIComponent(name)+"&background=random&color=fff'><span>"+name+"</span>";

r.ondragstart=e=>{
e.dataTransfer.setData("id",r.id);
};

return r;
}

async function saveData(){
let data={god:{},semi:{}};

["god","semi"].forEach(tier=>{
classes.forEach(cls=>{
data[tier][cls]=[];
document.querySelectorAll("#"+tier+" [data-cls='"+cls+"'] .row")
.forEach(r=>{
data[tier][cls].push(r.querySelector("span").textContent);
});
});
});

await tierRef.set(data);
}

function render(data){
createTables();

Object.keys(data).forEach(tier=>{
classes.forEach(cls=>{
if(Array.isArray(data[tier][cls])){
data[tier][cls].forEach(name=>{
document.querySelector("#"+tier+" [data-cls='"+cls+"']")
.appendChild(createRow(name));
});
}
});
});
}

async function init(){

let snap=await tierRef.get();

if(!snap.exists){
await tierRef.set(defaultData);
render(defaultData);
}else{
render(snap.data());
}

tierRef.onSnapshot(doc=>{
if(doc.exists){
render(doc.data());
}
});

}

init();

</script>

</body>
</html>
