<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tier List MCOC PRO</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f0f0f0;
  padding-top:90px;
}

/* TOP BAR */
.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2c3e50;
  padding:16px 28px;
  width:100%;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  box-sizing:border-box;
}

.button{
  background:#34495e;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.button:hover{background:#2980b9;}

#userArea{display:flex;align-items:center;gap:12px;}

.userInfo{
  display:flex;
  align-items:center;
  gap:10px;
  background:#34495e;
  padding:10px 14px;
  border-radius:999px;
}

.userInfo img{
  width:36px;
  height:36px;
  border-radius:50%;
}

.badge{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
  color:white;
  background:#2ecc71;
}

.badge.viewer{background:#95a5a6;}

.section{
  background:#34495e;
  color:white;
  font-weight:900;
  text-align:center;
  padding:14px 0;
  margin:26px auto 0;
  width:92%;
  border-radius:10px;
}

/* 🔥 GRID PERFECTO DE 6 COLUMNAS */
.table{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:14px;
  padding:18px 0 0;
  width:92%;
  margin:0 auto 20px;
}

.column{
  height:340px;
  background:white;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
  padding:12px;
  overflow-y:auto;
}

.header{
  font-size:18px;
  font-weight:900;
  text-align:center;
  margin-bottom:12px;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  margin-bottom:8px;
  background:#ecf0f1;
  border-radius:10px;
  cursor:grab;
}

.row img{
  width:30px;
  height:30px;
  border-radius:50%;
  object-fit:cover;
}

.placeholder{
  height:44px;
  background:#bfc5c8;
  border-radius:10px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="topBar">
  <div id="loginBtn" class="button">Login</div>
  <div id="userArea"></div>
</div>

<div id="tiersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAaIoPv9cXgnDZeADcahNokBjXW5NC9vn8",
  authDomain: "tier-list-mcoc.firebaseapp.com",
  projectId: "tier-list-mcoc",
  storageBucket: "tier-list-mcoc.firebasestorage.app",
  messagingSenderId: "171313453656",
  appId: "1:171313453656:web:83e1a681425422d8cac82d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tierRef = db.collection("tierData").doc("main");
const OWNER_UID = "HizrEHr3BjgUTyJZsSPoei0gHrA2";

const tiers = [
  { id: "new", label: "PERSONAJES NUEVOS" },
  { id: "god", label: "GOD TIER" },
  { id: "semi", label: "SEMI-GOD TIER" },
  { id: "usables", label: "USABLES TIER" },
  { id: "ocasionales", label: "OCASIONALES TIER" },
  { id: "meme", label: "MEME TIER" }
];

const classes = ["MUTANTES","HÁBILES","CIENTÍFICOS","MÍSTICOS","CÓSMICOS","TECNOS"];

const MANUAL_CHARACTERS = [
  {
    tier:"new",
    cls:"TECNOS",
    name:"Iron Man (Clásico)",
    image:"https://pbs.twimg.com/media/F5RqSzSXYAA-_Z-?format=png&name=360x360"
  },
  {
    tier:"new",
    cls:"MUTANTES",
    name:"Onslaught",
    image:"https://pbs.twimg.com/media/GAhX3ujXIAIKxIg?format=png&name=360x360"
  }
];

let isAdmin=false;
let draggedElement=null;
const placeholder=document.createElement("div");
placeholder.className="placeholder";

loginBtn.onclick=()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user=>{
  if(user){
    isAdmin=(user.uid===OWNER_UID);
    loginBtn.style.display="none";
    userArea.innerHTML=`
      <div class="userInfo">
        <img src="${user.photoURL}">
        <span>${user.displayName}</span>
        <span class="badge ${isAdmin?'':'viewer'}">${isAdmin?'ADMIN':'VIEWER'}</span>
        <div class="button" onclick="auth.signOut()">Cerrar sesión</div>
      </div>`;
  }else{
    isAdmin=false;
    loginBtn.style.display="block";
    userArea.innerHTML="";
  }
});

function buildStructure(){
  const container=document.getElementById("tiersContainer");
  container.innerHTML="";
  tiers.forEach(t=>{
    container.innerHTML+=`
      <div class="section">${t.label}</div>
      <div class="table" id="${t.id}"></div>`;
  });
}

function createTables(){
  tiers.forEach(t=>{
    const table=document.getElementById(t.id);
    table.innerHTML="";
    classes.forEach(cls=>{
      const col=document.createElement("div");
      col.className="column";
      col.dataset.cls=cls;
      col.innerHTML=`<div class="header">${cls}</div>`;

      col.addEventListener("dragover",e=>{
        if(!isAdmin)return;
        e.preventDefault();
        autoScroll(e);
        const after=getDragAfterElement(col,e.clientY);
        if(!after)col.appendChild(placeholder);
        else col.insertBefore(placeholder,after);
      });

      col.addEventListener("drop",async e=>{
        if(!isAdmin)return;
        e.preventDefault();
        col.insertBefore(draggedElement,placeholder);
        placeholder.remove();
        await saveData();
      });

      table.appendChild(col);
    });
  });
}

function autoScroll(e){
  const margin=150;
  const maxSpeed=60;
  const y=e.clientY;
  const h=window.innerHeight;

  if(y>h-margin){
    const intensity=(y-(h-margin))/margin;
    window.scrollBy(0,maxSpeed*intensity);
  }

  if(y<margin){
    const intensity=(margin-y)/margin;
    window.scrollBy(0,-maxSpeed*intensity);
  }
}

function getDragAfterElement(container,y){
  const els=[...container.querySelectorAll(".row:not(.dragging)")];
  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset){
      return{offset,element:child};
    }
    return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element;
}

function createRow(character){
  const r=document.createElement("div");
  r.className="row";
  r.innerHTML=`<img src="${character.image}"><span>${character.name}</span>`;

  if(isAdmin){
    r.draggable=true;
    r.addEventListener("dragstart",()=>{
      draggedElement=r;
      r.classList.add("dragging");
    });
    r.addEventListener("dragend",()=>{
      r.classList.remove("dragging");
      placeholder.remove();
      draggedElement=null;
    });
  }
  return r;
}

async function saveData(){
  const data={};
  tiers.forEach(t=>{
    data[t.id]={};
    classes.forEach(cls=>{
      data[t.id][cls]=[];
      document.querySelectorAll(`#${t.id} [data-cls="${cls}"] .row`)
      .forEach(r=>{
        data[t.id][cls].push({
          name:r.querySelector("span").textContent,
          image:r.querySelector("img").src
        });
      });
    });
  });
  await tierRef.set(data);
}

function render(data){
  buildStructure();
  createTables();
  tiers.forEach(t=>{
    classes.forEach(cls=>{
      data[t.id][cls].forEach(char=>{
        document.querySelector(`#${t.id} [data-cls="${cls}"]`)
        .appendChild(createRow(char));
      });
    });
  });
}

async function ensureBase(){
  await db.runTransaction(async tx=>{
    const snap=await tx.get(tierRef);
    let data=snap.exists?snap.data():null;

    if(!data){
      data={};
      tiers.forEach(t=>{
        data[t.id]={};
        classes.forEach(cls=>data[t.id][cls]=[]);
      });
    }

    MANUAL_CHARACTERS.forEach(ch=>{
      const exists=data[ch.tier][ch.cls]
        .some(c=>c.name===ch.name);
      if(!exists)data[ch.tier][ch.cls].push(ch);
    });

    tx.set(tierRef,data);
  });
}

async function init(){
  await ensureBase();
  const snap=await tierRef.get();
  if(snap.exists)render(snap.data());
  tierRef.onSnapshot(doc=>{
    if(doc.exists)render(doc.data());
  });
}

init();

</script>

</body>
</html>
